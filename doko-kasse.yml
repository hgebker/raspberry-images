version: "3.8"

services:
  doko-kasse:
    image: hgebker/doko-kasse:main
    container_name: doko-kasse
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: "mongodb://mongodb-prod:27017/dokokasse"

  doko-kasse-int:
    image: hgebker/doko-kasse:main
    container_name: doko-kasse-int
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      MONGODB_URI: "mongodb://mondodb-dev:27017/dokokasse"

networks:
  default:
    name: doko-kasse
